name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        run: npx playwright test
        env:
          # Admin credentials (GitHub Secrets)
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          # Auth0 config — these are public values embedded in the JS bundle
          VITE_AUTH0_DOMAIN: 'auth.sylphaxiom.com'
          VITE_AUTH0_CLIENT_ID: 'xaBOBCKHa0vNS1EVUvKuNiAlXNTdurLJ'
          VITE_AUTH0_CALLBACK_URL_D: 'http://localhost:5173/admin'
          # Square API token (GitHub Secret)
          VITE_FISH: ${{ secrets.VITE_FISH }}
          # Tell the app to skip React Query retries so API failures surface immediately
          VITE_CI: 'true'
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
